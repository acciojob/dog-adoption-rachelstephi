<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dog Adoption</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 20px;
        }

        h1 {
            color: #333;
        }

        ul {
            list-style-type: none;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        li {
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        img {
            width: 250px;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>Dog Breeds</h1>

  <ul>
    <li>
        <a href="https://en.wikipedia.org/wiki/Golden_Retriever">
            <img
                src="https://upload.wikimedia.org/wikipedia/commons/c/cf/BassetHound_profil.jpg"
                alt="Golden Retriever"
            />
        </a>
    </li>

    <li>
        <a href="https://en.wikipedia.org/wiki/Poodle">
            <img
                src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f8/Full_attention_%288067543690%29.jpg/1280px-Full_attention_%288067543690%29.jpg"
                alt="Poodle"
            />
        </a>
    </li>
</ul>
</body>
</html>
