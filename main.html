<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dog Adoption</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 20px;
        }

        h1 {
            color: #333;
        }

        ul {
            list-style-type: none;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        li {
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        img {
            width: 250px;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>Dog Breeds</h1>

    <ul>
        <li>
            <a href="https://en.wikipedia.org/wiki/Golden_Retriever" target="_blank">
                <img
                    src="https://images.dog.ceo/breeds/retriever-golden/n02099601_3004.jpg"
                    alt="Golden Retriever"
                />
            </a>
        </li>

        <li>
            <a href="https://en.wikipedia.org/wiki/Poodle" target="_blank">
                <img
                    src="https://images.dog.ceo/breeds/poodle-standard/n02113799_2280.jpg"
                    alt="Poodle"
                />
            </a>
        </li>
    </ul>
</body>
</html>
